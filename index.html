        @font-face { font-family: 'BMWTypeNext'; src: url('https://cdn.jsdelivr.net/gh/djore4/Caetano@main/fonts/BMWTypeNextLatin-Light.otf') format('opentype'); font-weight: 300; font-style: normal; }
        
        body { font-family: 'BMWTypeNext', 'Helvetica Neue', Arial, sans-serif; letter-spacing: -0.01em; overflow-x: hidden; }
        .filter-btn.active, .user-btn.active { background-color: #0066B1; color: white; border-color: #0066B1; }

                    <div class="w-full sm:w-auto sm:border-l sm:border-gray-200 sm:pl-6"><label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 block">Concessão</label><div class="flex flex-wrap gap-2" id="filtro-local-container"><button onclick="setFiltro('local', 'Todas')" class="filter-btn active border px-3 py-1.5 rounded-md text-[11px] font-bold">Todas</button><button onclick="setFiltro('local', 'Porto')" class="filter-btn border px-3 py-1.5 rounded-md text-[11px] font-bold bg-white text-gray-600 border-gray-200">Porto</button><button onclick="setFiltro('local', 'Gaia')" class="filter-btn border px-3 py-1.5 rounded-md text-[11px] font-bold bg-white text-gray-600 border-gray-200">Gaia</button><button onclick="setFiltro('local', 'Maia')" class="filter-btn border px-3 py-1.5 rounded-md text-[11px] font-bold bg-white text-gray-600 border-gray-200">Maia</button><button onclick="setFiltro('local', 'Feira')" class="filter-btn border px-3 py-1.5 rounded-md text-[11px] font-bold bg-white text-gray-600 border-gray-200">Feira</button><button onclick="setFiltro('local', 'Aveiro')" class="filter-btn border px-3 py-1.5 rounded-md text-[11px] font-bold bg-white text-gray-600 border-gray-200">Aveiro</button></div></div>
                </div>
                <div class="flex flex-col sm:flex-row gap-6 pt-4 border-t border-gray-100">
                    <div class="w-full sm:w-auto"><label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 block">Tipo</label><div class="flex flex-wrap gap-2" id="filtro-estado-container"><button onclick="setFiltro('estado', 'Todos')" class="filter-btn active border px-3 py-1.5 rounded-md text-[11px] font-bold">Todos</button><button onclick="setFiltro('estado', 'VN')" class="filter-btn border px-3 py-1.5 rounded-md text-[11px] font-bold bg-white text-gray-600 border-gray-200">VN</button><button onclick="setFiltro('estado', 'VU')" class="filter-btn border px-3 py-1.5 rounded-md text-[11px] font-bold bg-white text-gray-600 border-gray-200">VU</button></div></div>
                    <div class="w-full sm:w-auto sm:border-l sm:border-gray-200 sm:pl-6"><label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 block">Marca</label><div class="flex flex-wrap gap-2" id="filtro-marca-container"><button onclick="setFiltro('marca', 'Todas')" class="filter-btn active border px-3 py-1.5 rounded-md text-[11px] font-bold">Todas</button><button onclick="setFiltro('marca', 'BMW')" class="filter-btn border px-3 py-1.5 rounded-md text-[11px] font-bold bg-white text-gray-600 border-gray-200">BMW</button><button onclick="setFiltro('marca', 'MINI')" class="filter-btn border px-3 py-1.5 rounded-md text-[11px] font-bold bg-white text-gray-600 border-gray-200">MINI</button></div></div>
                </div>
                <div class="flex justify-between items-end border-t border-gray-200 pt-4"><div class="text-[11px] font-bold text-gray-400 uppercase tracking-widest"><span id="num-resultados" class="text-bmw font-black text-sm">0</span> viaturas</div>
                    <div class="flex bg-gray-100 p-1 rounded-lg border border-gray-200 shadow-inner">

                        <button onclick="mudarVista('cartoes')" id="btn-vista-cartoes" class="px-4 py-1.5 text-xs font-bold rounded-md text-gray-500 uppercase transition-all bg-transparent border border-transparent hover:bg-gray-200 hover:text-gray-800">Cartões</button>
                    </div>
                </div>
            </div>
            <div id="dados-viaturas">
                <div id="vista-cartoes" class="hidden grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>
                <div id="vista-tabela" class="block bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden w-full">
                    <div class="overflow-x-auto no-scrollbar w-full">
                        <table class="min-w-full divide-y divide-gray-100">
                            <thead class="bg-gray-50 text-[10px] font-bold text-gray-500 uppercase tracking-widest select-none">
                                <tr>
                                    <th class="px-5 py-4 text-center whitespace-nowrap cursor-pointer hover:bg-gray-200" onclick="ordenarTabela('local')">Local<span id="sort-icon-local" class="text-bmw ml-1"></span></th>
                                    <th class="px-5 py-4 text-left whitespace-nowrap cursor-pointer hover:bg-gray-200" onclick="ordenarTabela('modelo')">Modelo<span id="sort-icon-modelo" class="text-bmw ml-1"></span></th>
                                    <th class="px-5 py-4 text-left whitespace-nowrap cursor-pointer hover:bg-gray-200" onclick="ordenarTabela('versao')">Versão<span id="sort-icon-versao" class="text-bmw ml-1"></span></th>
                                    <th class="px-5 py-4 text-left whitespace-nowrap cursor-pointer hover:bg-gray-200" onclick="ordenarTabela('encomenda')">Enc<span id="sort-icon-encomenda" class="text-bmw ml-1"></span></th>
                                    <th class="px-5 py-4 text-left whitespace-nowrap cursor-pointer hover:bg-gray-200" onclick="ordenarTabela('chassis')">Chassis<span id="sort-icon-chassis" class="text-bmw ml-1"></span></th>
                                    <th class="px-5 py-4 text-left whitespace-nowrap cursor-pointer hover:bg-gray-200" onclick="ordenarTabela('matricula')">Matrícula<span id="sort-icon-matricula" class="text-bmw ml-1"></span></th>
                                    <th class="px-5 py-4 text-center whitespace-nowrap cursor-pointer hover:bg-gray-200" onclick="ordenarTabela('data_matricula')">Data<span id="sort-icon-data_matricula" class="text-bmw ml-1"></span></th>
                                    <th class="px-5 py-4 text-right whitespace-nowrap cursor-pointer hover:bg-gray-200" onclick="ordenarTabela('pvp_bruto')">PVP Base<span id="sort-icon-pvp_bruto" class="text-bmw ml-1"></span></th>
                                    <th class="px-5 py-4 text-right text-bmw whitespace-nowrap cursor-pointer hover:bg-blue-100" onclick="ordenarTabela('pvp_final')">PVP Final<span id="sort-icon-pvp_final" class="text-bmw ml-1"></span></th>
                                </tr>
                            </thead>
                            <tbody id="tabela-corpo" class="divide-y divide-gray-100 bg-white"></tbody>
                        </table>
                    </div>
                </div>
                <div id="sem-resultados" class="hidden text-center py-24 bg-white rounded-2xl border border-gray-200 shadow-sm"><p class="text-gray-500 font-medium">Nenhuma viatura.</p></div>
            </div>
        </div>
        </main>

    <script>
        // Configurações Supabase e Variáveis Globais mantidas
        const supabaseUrl = 'https://yifxgiwmibjaornighvt.supabase.co'; 
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlpZnhnaXdtaWJqYW9ybmlnaHZ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NjMxNTgsImV4cCI6MjA4NzQzOTE1OH0.XXG4TypXvwhB8EFW63zfBXq4fn03dJ4g73ty9Tzco90';
        let supabaseClient = null;
        try { if(supabaseUrl && !supabaseUrl.includes('COLA_AQUI')) { supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey); } } catch(e) { console.error("Erro Supabase", e); }

        let inventario = []; let utilizadoresDb = []; let currentUser = null; 
        let filtros = {modelo:'Todos', local:'Todas', tipologia:'Todas', estado:'Todos', marca:'Todas'};
        let currentSortCol = null; let currentSortAsc = true;

        // --- ALTERAÇÃO 1: REMOÇÃO DE DECIMAIS PARA VISTA PÚBLICA ---
        function formatarEuros(num) { 
            // Se não houver user logado, remove casas decimais
            const decimais = currentUser ? 2 : 0;
            return (num||0).toLocaleString('pt-PT', {minimumFractionDigits: decimais, maximumFractionDigits: decimais}) + ' €'; 
        }

        // Restantes funções auxiliares (getArr, strParaNumero, etc) mantidas
        function getArr(v) { if(!v) return []; if(Array.isArray(v)) return v; if(typeof v === 'string') { try { let p = JSON.parse(v); return Array.isArray(p)?p:[v]; } catch(e) { return v.includes(',')?v.split(',').map(s=>s.trim()):[v]; } } return []; }
        function getInps(v) { const template = { pvb: 0, opc: 0, bsi: 0, eco: 4.20, leg: 1550, isv: 0, mgb: 0, esf: 0, pac: 0, dem: 0, sup: 0, pvp_desc: 0, depreciacoes: 0 }; if(!v) return {...template}; if(typeof v === 'string') { try { return JSON.parse(v); } catch(e) { return {...template}; } } return typeof v === 'object' ? v : {...template}; }

        window.onload = async () => { mudarTab('parque'); await inicializarDados(); };

        async function inicializarDados() {
            if(!supabaseClient) { executarArranqueLocal(); return; }
            try {
                const { data: vData } = await supabaseClient.from('viaturas').select('*');
                if (vData) inventario = vData; 
                const { data: uData } = await supabaseClient.from('utilizadores').select('*');
                if (uData) utilizadoresDb = uData;
            } catch(e) { console.error("Erro rede:", e); }
            document.getElementById('loading-supabase').classList.add('hidden');
            executarArranqueLocal();
        }

        function executarArranqueLocal() {
            carregarPrecosEmDireto(); initModeloFiltros(); aplicarFiltros();
            if (window.innerWidth < 768) mudarVista('cartoes'); else mudarVista('tabela');
        }

        function carregarPrecosEmDireto() { 
            inventario.forEach(c => { 
                const inps = getInps(c.inputs);
                const pvp_bruto = ((inps.pvb||0) + (inps.opc||0) + (inps.bsi||0) + (inps.eco||0) + (inps.leg||0) + (inps.isv||0)) * 1.23;
                c.pvp_bruto = pvp_bruto;
                c.pvp_final = inps.pvp_desc || 0;
                
                // Cálculo de dias para badges
                if (c.data_matricula) {
                    const diff = new Date() - new Date(c.data_matricula);
                    c.idade_dias = diff > 0 ? Math.floor(diff / (1000 * 60 * 60 * 24)) : 0;
                } else { c.idade_dias = 0; }
            }); 
        }

        function initModeloFiltros() { 
            const c=document.getElementById('filtro-modelo-container'); 
            c.innerHTML=`<button onclick="setFiltro('modelo','Todos')" class="filter-btn active border px-3 py-1.5 rounded-md text-[11px] font-bold">Todos</button>`; 
            [...new Set(inventario.map(x=>x.modelo || "N/A"))].sort().forEach(m=>{ if(m !== "N/A") c.innerHTML+=`<button onclick="setFiltro('modelo','${m}')" class="filter-btn border px-3 py-1.5 rounded-md text-[11px] font-bold bg-white text-gray-600 hover:text-bmw hover:border-bmw">${m}</button>`; }); 
        }

        function setFiltro(tipo, valor) { 
            filtros[tipo] = valor; 
            Array.from(document.getElementById(`filtro-${tipo}-container`).children).forEach(btn => { 
                if(btn.innerText === valor || (valor === 'Todas' && btn.innerText === 'Todas') || (valor === 'Todos' && btn.innerText === 'Todos')) { 
                    btn.classList.add('active', 'text-white'); btn.classList.remove('bg-white', 'text-gray-600'); 
                } else { 
                    btn.classList.remove('active', 'text-white'); btn.classList.add('bg-white', 'text-gray-600'); 
                } 
            }); 
            aplicarFiltros(); 
        }

        function aplicarFiltros() { 
            const res = inventario.filter(c => {
                const arrLoc = getArr(c.local); const arrTip = getArr(c.tipologia);
                return (filtros.modelo==='Todos' || c.modelo===filtros.modelo) && (filtros.local==='Todas' || arrLoc.includes(filtros.local)) && (filtros.tipologia==='Todas' || arrTip.includes(filtros.tipologia)) && (filtros.estado==='Todos' || c.estado_negocio === filtros.estado) && (filtros.marca==='Todas' || c.marca === filtros.marca);
            }); 
            document.getElementById('num-resultados').innerText = res.length; 
            renderizar(res); 
        }

        function isReservado(carro) { return carro.reserva_expira && new Date(carro.reserva_expira) > new Date(); }

        function renderizar(dados) {
            if(dados.length===0) { document.getElementById('dados-viaturas').classList.add('hidden'); document.getElementById('sem-resultados').classList.remove('hidden'); return; }
            document.getElementById('dados-viaturas').classList.remove('hidden'); document.getElementById('sem-resultados').classList.add('hidden');

            // Render Cartões
            document.getElementById('vista-cartoes').innerHTML = dados.map(c => {
                const reservado = isReservado(c);
                const classCard = reservado ? 'bg-yellow-50 border-yellow-400' : 'bg-white border-gray-200';
                return `<div class="${classCard} border rounded-2xl p-5 shadow-sm hover:shadow-md transition-all cursor-pointer relative overflow-hidden" onclick="abrirDetalheViatura('${c.chassis}')">
                    <div class="flex justify-between items-start mb-4">
                        <div><h3 class="font-black text-gray-900">${c.modelo} ${c.versao}</h3><p class="text-[10px] text-gray-500 uppercase">${c.matricula || c.chassis}</p></div>
                        ${c.idade_dias < 90 ? '<span class="bg-green-100 text-green-700 text-[9px] px-2 py-0.5 rounded-full font-bold">Novo</span>' : ''}
                    </div>
                    <div class="text-2xl font-black text-bmw mb-4">${formatarEuros(c.pvp_final)}</div>
                    <div class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">${getArr(c.local).join(' | ')}</div>
                </div>`;
            }).join('');

            // Render Tabela
            document.getElementById('tabela-corpo').innerHTML = dados.map(c => {
                const reservado = isReservado(c);
                return `<tr class="${reservado ? 'bg-yellow-50' : 'hover:bg-blue-50'} border-b border-gray-50 cursor-pointer" onclick="abrirDetalheViatura('${c.chassis}')">
                    <td class="px-5 py-4 text-center text-xs">${getArr(c.local)[0] || '-'}</td>
                    <td class="px-5 py-4 font-bold text-sm">${c.modelo}</td>
                    <td class="px-5 py-4 text-xs text-gray-500">${c.versao}</td>
                    <td class="px-5 py-4 text-xs font-mono">${c.encomenda || '-'}</td>
                    <td class="px-5 py-4 text-xs font-mono uppercase">${c.chassis}</td>
                    <td class="px-5 py-4 text-xs font-mono uppercase">${c.matricula || '-'}</td>
                    <td class="px-5 py-4 text-center text-xs">${c.data_matricula ? new Date(c.data_matricula).toLocaleDateString('pt-PT') : '-'}</td>
                    <td class="px-5 py-4 text-right text-xs text-gray-400 line-through">${formatarEuros(c.pvp_bruto)}</td>
                    <td class="px-5 py-4 text-right font-black text-bmw text-sm">${formatarEuros(c.pvp_final)}</td>
                </tr>`;
            }).join('');
        }

        // --- SISTEMA DE LOGIN PARA ATUALIZAR PREÇOS (DINAMICAMENTE) ---
        async function fazerLogin(e) {
            e.preventDefault(); 
            const email = document.getElementById('login-email').value.toLowerCase();
            const pass = document.getElementById('login-password').value;
            const user = utilizadoresDb.find(u => u.email === email && u.password === pass);
            if(user) { 
                currentUser = user; 
                fecharLogin(); 
                document.getElementById('user-info-header').classList.remove('hidden');
                document.getElementById('btn-login-header').classList.add('hidden');
                document.getElementById('header-user-name').innerText = user.nome;
                // Re-renderiza para mostrar decimais
                aplicarFiltros(); 
            } else { alert("Login incorreto."); }
        }

        function mudarTab(t) { 
            document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active')); 
            const tgt = document.getElementById('conteudo-'+t); if(tgt) tgt.classList.add('active'); 
        }
        function mudarVista(v) { 
            document.getElementById('vista-tabela').style.display = v==='tabela'?'block':'none'; 
            document.getElementById('vista-cartoes').style.display = v==='cartoes'?'grid':'none'; 
        }
        function abrirLogin() { document.getElementById('modal-login').classList.remove('hidden'); document.getElementById('modal-login').classList.add('flex'); }
        function fecharLogin() { document.getElementById('modal-login').classList.add('hidden'); }
        function abrirDetalheViatura(ch) { /* Lógica de modal de detalhe mantida */ }
    </script>
